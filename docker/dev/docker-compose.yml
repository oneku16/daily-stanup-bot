services:
  db:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-standup}
      POSTGRES_DB: ${POSTGRES_DB:-standup}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
  bot:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

volumes:
  pgdata_dev:
