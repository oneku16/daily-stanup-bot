services:
  db:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-standup}
      POSTGRES_DB: ${POSTGRES_DB:-standup}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped
  bot:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata_prod:
